<div class="audit-page">

    <mat-card class="audit-card">

        <div class="header-section">

            <h1>
                Audit Logs
            </h1>

            <p>
                Monitor all system activities
                and administrative actions.
            </p>

        </div>

        <table
            mat-table

            [dataSource]="auditLogs"

            class="mat-elevation-z2">

            <!-- Action -->

            <ng-container
                matColumnDef="action">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Action

                </th>

                <td
                    mat-cell
                    *matCellDef="let log">

                    {{
                        log.action
                    }}

                </td>

            </ng-container>

            <!-- Entity -->

            <ng-container
                matColumnDef="entityName">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Entity

                </th>

                <td
                    mat-cell
                    *matCellDef="let log">

                    {{
                        log.entityName
                    }}

                </td>

            </ng-container>

            <!-- Description -->

            <ng-container
                matColumnDef="description">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Description

                </th>

                <td
                    mat-cell
                    *matCellDef="let log">

                    {{
                        log.description
                    }}

                </td>

            </ng-container>

            <!-- Performed By -->

            <ng-container
                matColumnDef="performedBy">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Performed By

                </th>

                <td
                    mat-cell
                    *matCellDef="let log">

                    {{
                        log.performedBy
                    }}

                </td>

            </ng-container>

            <!-- Date -->

            <ng-container
                matColumnDef="performedOn">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Date

                </th>

                <td
                    mat-cell
                    *matCellDef="let log">

                    {{
                        log.performedOn
                        | date :
                        'medium'
                    }}

                </td>

            </ng-container>

            <tr
                mat-header-row

                *matHeaderRowDef="
                    displayedColumns
                ">
            </tr>

            <tr
                mat-row

                *matRowDef="
                    let row;

                    columns:
                        displayedColumns
                ">
            </tr>

        </table>

    </mat-card>

</div>
