<div class="audit-page">

    <mat-card class="audit-card">

        <div class="header-section">

            <div class="header-content">

                <h1>
                    Audit Logs
                </h1>

                <p>
                    Monitor system activities, user actions,
                    and administrative operations across the platform.
                </p>

            </div>

        </div>

        <div class="table-container">

            <table
                mat-table
                [dataSource]="auditLogs">

                <!-- Action -->

                <ng-container matColumnDef="action">

                    <th
                        mat-header-cell
                        *matHeaderCellDef>

                        Action

                    </th>

                    <td
                        mat-cell
                        *matCellDef="let log">

                        <span
                            class="action-chip"

                            [ngClass]="{
                              'add-action':
                                log.action === 'Add',

                              'update-action':
                                log.action === 'Update',

                              'delete-action':
                                log.action === 'Delete'
                            }">

                            {{ log.action }}

                        </span>

                    </td>

                </ng-container>

                <!-- Entity -->

                <ng-container
                    matColumnDef="entityName">

                    <th
                        mat-header-cell
                        *matHeaderCellDef>

                        Entity

                    </th>

                    <td
                        mat-cell
                        *matCellDef="let log">

                        <strong>

                            {{ log.entityName }}

                        </strong>

                    </td>

                </ng-container>

                <!-- Description -->

                <ng-container
                    matColumnDef="description">

                    <th
                        mat-header-cell
                        *matHeaderCellDef>

                        Description

                    </th>

                    <td
                        mat-cell
                        *matCellDef="let log">

                        {{ log.description }}

                    </td>

                </ng-container>

                <!-- Performed By -->

                <ng-container
                    matColumnDef="performedBy">

                    <th
                        mat-header-cell
                        *matHeaderCellDef>

                        Performed By

                    </th>

                    <td
                        mat-cell
                        *matCellDef="let log">

                        {{ log.performedBy }}

                    </td>

                </ng-container>

                <!-- Date -->

                <ng-container
                    matColumnDef="performedOn">

                    <th
                        mat-header-cell
                        *matHeaderCellDef>

                        Date & Time

                    </th>

                    <td
                        mat-cell
                        *matCellDef="let log">

                        {{ log.performedOn | date:'dd MMM yyyy, hh:mm a' }}

                    </td>

                </ng-container>

                <tr
                    mat-header-row
                    *matHeaderRowDef="displayedColumns">
                </tr>

                <tr
                    mat-row
                    *matRowDef="
                        let row;
                        columns: displayedColumns
                    ">
                </tr>

            </table>

        </div>

    </mat-card>

</div>
