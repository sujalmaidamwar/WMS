<div class="report-page">

  <mat-card class="report-card">

    <div class="header-section">

      <h1>
        Attendance Report
      </h1>

      <p>
        Generate monthly attendance reports
        and export as PDF.
      </p>

    </div>

    <!-- Filters -->

    <div class="filter-section">

      <!-- Month -->

      <mat-form-field appearance="outline">

        <mat-label>
          Month
        </mat-label>

        <mat-select [(ngModel)]="
            selectedMonth
          ">

          <mat-option *ngFor="
              let month
              of months
            " [value]="
              month.value
            ">

            {{
            month.name
            }}

          </mat-option>

        </mat-select>

      </mat-form-field>

      <!-- Year -->

      <mat-form-field appearance="outline">

        <mat-label>
          Year
        </mat-label>

        <input matInput type="number" [(ngModel)]="
            selectedYear
          ">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Employee
        </mat-label>

        <mat-select [(ngModel)]="selectedEmployeeId">

          <mat-option [value]="0">

            All Employees

          </mat-option>

          <mat-option *ngFor="let employee of employees" [value]="employee.employeeId">

            {{
            employee.firstName
            }}

            {{
            employee.lastName
            }}

          </mat-option>

        </mat-select>

      </mat-form-field>
      <!-- Generate -->

      <button mat-raised-button color="primary" (click)="
          loadReport()
        ">

        Generate Report

      </button>

      <!-- Export -->

      <button mat-raised-button color="accent" (click)="
          exportPDF()
        ">

        Export PDF

      </button>

    </div>

    <!-- Table -->

    <table mat-table [dataSource]="
        attendanceList
      " class="mat-elevation-z2">

      <!-- Employee -->

      <ng-container matColumnDef="employeeId">

        <th mat-header-cell *matHeaderCellDef>

          Employee ID

        </th>

        <td mat-cell *matCellDef="
            let row
          ">

          {{
          row.employeeId
          }}

        </td>

      </ng-container>

      <!-- Date -->

      <ng-container matColumnDef="attendanceDate">

        <th mat-header-cell *matHeaderCellDef>

          Date

        </th>

        <td mat-cell *matCellDef="let row">

          {{
          row.attendanceDate
          | date
          }}

        </td>

      </ng-container>

      <!-- Status -->

      <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>

          Status

        </th>

        <td mat-cell *matCellDef="let row
          ">

          {{
          row.status
          }}

        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="[
          'employeeId',
          'attendanceDate',
          'status'
        ]">
      </tr>

      <tr mat-row *matRowDef="
          let row;

          columns: [
            'employeeId',
            'attendanceDate',
            'status'
          ]
        ">
      </tr>

    </table>

  </mat-card>

</div>
