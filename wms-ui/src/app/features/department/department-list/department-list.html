<div class="department-container">

  <!-- Add Department Card -->

  <mat-card class="department-card">

    <div class="header-section">


      <div class="header-content">

        <h1>
          Department Management
        </h1>

        <p>
          Create and manage organizational departments.
        </p>

      </div>

    </div>

    <form
      class="department-form"
      [formGroup]="departmentForm"
      (ngSubmit)="addDepartment()">

      <div class="form-grid">

        <mat-form-field appearance="outline">

          <mat-label>
            Department Name
          </mat-label>

          <input
            matInput
            placeholder="Enter department name"
            formControlName="departmentName">

        </mat-form-field>

        <mat-form-field appearance="outline">

          <mat-label>
            Description
          </mat-label>

          <input
            matInput
            placeholder="Enter department description"
            formControlName="description">

        </mat-form-field>

      </div>

      <div class="button-section">

        <button
          mat-raised-button
          color="primary"
          type="submit">

          Add Department

        </button>

      </div>

    </form>

  </mat-card>

  <!-- Department List Card -->

  <mat-card class="table-card">

    <div class="table-header">

      <h2>
        Department List
      </h2>

      <span>
        Total Departments: {{ dataSource.data.length }}
      </span>

    </div>

    <div class="table-container">

      <table
        mat-table
        [dataSource]="dataSource">

        <!-- Department ID -->

        <ng-container matColumnDef="departmentId">

          <th
            mat-header-cell
            *matHeaderCellDef>

            ID

          </th>

          <td
            mat-cell
            *matCellDef="let d">

            {{ d.departmentId }}

          </td>

        </ng-container>

        <!-- Department Name -->

        <ng-container matColumnDef="departmentName">

          <th
            mat-header-cell
            *matHeaderCellDef>

            Department Name

          </th>

          <td
            mat-cell
            *matCellDef="let d">

            <strong>

              {{ d.departmentName }}

            </strong>

          </td>

        </ng-container>

        <!-- Description -->

        <ng-container matColumnDef="description">

          <th
            mat-header-cell
            *matHeaderCellDef>

            Description

          </th>

          <td
            mat-cell
            *matCellDef="let d">

            {{ d.description }}

          </td>

        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns">
        </tr>

        <tr
          mat-row
          *matRowDef="
            let row;
            columns: displayedColumns
          ">
        </tr>

      </table>

    </div>

  </mat-card>

</div>
