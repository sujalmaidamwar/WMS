<div class="department-container">

  <mat-card>

    <h2>Departments</h2>

    <form
      [formGroup]="departmentForm"
      (ngSubmit)="addDepartment()">

      <mat-form-field
        appearance="outline">

        <mat-label>
          Department Name
        </mat-label>

        <input
          matInput
          formControlName=
            "departmentName">

      </mat-form-field>

      <mat-form-field
        appearance="outline">

        <mat-label>
          Description
        </mat-label>

        <input
          matInput
          formControlName=
            "description">

      </mat-form-field>

      <button
        mat-raised-button
        color="primary">

        Add Department

      </button>

    </form>

  </mat-card>

  <mat-card>

    <table
      mat-table
      [dataSource]="dataSource">

      <!-- ID -->
      <ng-container
        matColumnDef=
          "departmentId">

        <th
          mat-header-cell
          *matHeaderCellDef>

          ID

        </th>

        <td
          mat-cell
          *matCellDef=
            "let d">

          {{ d.departmentId }}

        </td>

      </ng-container>

      <!-- Name -->
      <ng-container
        matColumnDef=
          "departmentName">

        <th
          mat-header-cell
          *matHeaderCellDef>

          Name

        </th>

        <td
          mat-cell
          *matCellDef=
            "let d">

          {{ d.departmentName }}

        </td>

      </ng-container>

      <!-- Description -->
      <ng-container
        matColumnDef=
          "description">

        <th
          mat-header-cell
          *matHeaderCellDef>

          Description

        </th>

        <td
          mat-cell
          *matCellDef=
            "let d">

          {{ d.description }}

        </td>

      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef=
          "displayedColumns">
      </tr>

      <tr
        mat-row
        *matRowDef=
          "let row;
          columns:
          displayedColumns">
      </tr>

    </table>

  </mat-card>

</div>
