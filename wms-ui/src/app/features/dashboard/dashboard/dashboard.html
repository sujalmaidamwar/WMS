<div class="dashboard-container">

  <!-- Welcome Section -->

  <div class="dashboard-header">

    <div>

      <h1>
        Dashboard
      </h1>

      <p>
        Workforce Management System Overview
      </p>

    </div>

  </div>

  <!-- Statistics Cards -->

  <div class="stats-grid">

    <mat-card class="stat-card employees">

      <div class="card-icon">
        👥
      </div>

      <div>

        <h3>Total Employees</h3>

        <h1>{{ totalEmployees }}</h1>

      </div>

    </mat-card>

    <mat-card class="stat-card present">

      <div class="card-icon">
        ✅
      </div>

      <div>

        <h3>Present Today</h3>

        <h1>{{ presentToday }}</h1>

      </div>

    </mat-card>

    <mat-card class="stat-card absent">

      <div class="card-icon">
        ❌
      </div>

      <div>

        <h3>Absent Today</h3>

        <h1>{{ absentToday }}</h1>

      </div>

    </mat-card>

    <mat-card class="stat-card attendance">

      <div class="card-icon">
        📅
      </div>

      <div>

        <h3>Total Attendance</h3>

        <h1>{{ totalAttendance }}</h1>

      </div>

    </mat-card>

  </div>

  <!-- Chart Section -->

  <mat-card class="chart-card">

    <div class="chart-header">

      <h2>
        Attendance Overview
      </h2>

      <span class="chart-subtitle">

        Present vs Absent Distribution

      </span>

    </div>

    <div class="chart-wrapper">

      <canvas
        baseChart
        [data]="pieChartData"
        [type]="pieChartType">

      </canvas>

    </div>

  </mat-card>

</div>
