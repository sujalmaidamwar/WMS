<div class="client-page">

    <mat-card class="client-card">

        <div class="header-section">

            <h1>
                Clients
            </h1>

            <button
                mat-raised-button
                color="primary"

                *ngIf="
                    isAdmin() ||
                    isManager()
                "

                [routerLink]="[
                    '/add-client'
                ]">

                Add Client

            </button>

        </div>

        <table
            mat-table

            [dataSource]="clients"

            class="mat-elevation-z2">

            <!-- Client Name -->

            <ng-container
                matColumnDef="clientName">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Client Name

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    {{
                        client.clientName
                    }}

                </td>

            </ng-container>

            <!-- Company -->

            <ng-container
                matColumnDef="companyName">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Company

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    {{
                        client.companyName
                    }}

                </td>

            </ng-container>

            <!-- Email -->

            <ng-container
                matColumnDef="email">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Email

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    {{
                        client.email
                    }}

                </td>

            </ng-container>

            <!-- Phone -->

            <ng-container
                matColumnDef="phoneNumber">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Phone

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    {{
                        client.phoneNumber
                    }}

                </td>

            </ng-container>

            <!-- Status -->

            <ng-container
                matColumnDef="status">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Status

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    {{
                        client.isActive
                            ? 'Active'
                            : 'Inactive'
                    }}

                </td>

            </ng-container>

            <!-- Actions -->

            <ng-container
                matColumnDef="actions">

                <th
                    mat-header-cell
                    *matHeaderCellDef>

                    Actions

                </th>

                <td
                    mat-cell
                    *matCellDef="let client">

                    <button
                        mat-raised-button
                        color="primary"

                        *ngIf="
                            isAdmin() ||
                            isManager()
                        "

                        [routerLink]="[
                            '/edit-client',
                            client.clientId
                        ]">

                        Edit

                    </button>

                    <button
                        mat-raised-button
                        color="warn"

                        *ngIf="
                            isAdmin()
                        "

                        (click)="
                            deleteClient(
                                client.clientId
                            )
                        ">

                        Delete

                    </button>

                </td>

            </ng-container>

            <tr
                mat-header-row

                *matHeaderRowDef="
                    displayedColumns
                ">
            </tr>

            <tr
                mat-row

                *matRowDef="
                    let row;

                    columns:
                        displayedColumns
                ">
            </tr>

        </table>

    </mat-card>

</div>
