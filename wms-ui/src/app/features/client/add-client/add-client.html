<div class="client-page">

    <mat-card class="client-card">

        <div class="header-section">

            <h1>
                Add Client
            </h1>

            <p>
                Create and manage client information
                for projects and business operations.
            </p>

        </div>

        <form
            [formGroup]="clientForm"

            (ngSubmit)="onSubmit()">

            <!-- Client Name -->

            <mat-form-field
                appearance="outline"

                class="full-width">

                <mat-label>
                    Client Name
                </mat-label>

                <input
                    matInput

                    formControlName="clientName">

            </mat-form-field>

            <!-- Company Name -->

            <mat-form-field
                appearance="outline"

                class="full-width">

                <mat-label>
                    Company Name
                </mat-label>

                <input
                    matInput

                    formControlName="companyName">

            </mat-form-field>

            <!-- Email -->

            <mat-form-field
                appearance="outline"

                class="full-width">

                <mat-label>
                    Email
                </mat-label>

                <input
                    matInput

                    type="email"

                    formControlName="email">

            </mat-form-field>

            <!-- Phone -->

            <mat-form-field
                appearance="outline"

                class="full-width">

                <mat-label>
                    Phone Number
                </mat-label>

                <input
                    matInput

                    formControlName="phoneNumber">

            </mat-form-field>

            <!-- Address -->

            <mat-form-field
                appearance="outline"

                class="full-width">

                <mat-label>
                    Address
                </mat-label>

                <textarea
                    matInput

                    rows="4"

                    formControlName="address">
                </textarea>

            </mat-form-field>

            <!-- Active -->

            <div class="checkbox-section">

                <mat-checkbox
                    formControlName="isActive">

                    Active Client

                </mat-checkbox>

            </div>

            <!-- Buttons -->

            <div class="button-section">

                <button
                    mat-raised-button
                    color="primary"

                    type="submit">

                    Save Client

                </button>

                <button
                    mat-stroked-button
                    color="warn"

                    type="button"

                    routerLink="/clients">

                    Cancel

                </button>

            </div>

        </form>

    </mat-card>

</div>
