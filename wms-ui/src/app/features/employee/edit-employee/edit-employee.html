<div class="form-container" *ngIf="isLoaded">

  <mat-card class="employee-card">

    <div class="header-section">

    

      <div class="header-content">

        <h1>
          Edit Employee
        </h1>

        <p>
          Update employee information and department details.
        </p>

      </div>

    </div>

    <form
      class="employee-form"
      [formGroup]="employeeForm"
      (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <!-- First Name -->

        <mat-form-field appearance="outline">

          <mat-label>
            First Name
          </mat-label>

          <input
            matInput
            placeholder="Enter first name"
            formControlName="firstName">

        </mat-form-field>

        <!-- Last Name -->

        <mat-form-field appearance="outline">

          <mat-label>
            Last Name
          </mat-label>

          <input
            matInput
            placeholder="Enter last name"
            formControlName="lastName">

        </mat-form-field>

        <!-- Email -->

        <mat-form-field appearance="outline">

          <mat-label>
            Email Address
          </mat-label>

          <input
            matInput
            placeholder="employee@company.com"
            formControlName="email">

        </mat-form-field>

        <!-- Phone -->

        <mat-form-field appearance="outline">

          <mat-label>
            Phone Number
          </mat-label>

          <input
            matInput
            placeholder="+91 XXXXX XXXXX"
            formControlName="phoneNumber">

        </mat-form-field>

        <!-- Department -->

        <mat-form-field appearance="outline">

          <mat-label>
            Department
          </mat-label>

          <mat-select formControlName="departmentId">

            <mat-option
              *ngFor="let dept of departments"
              [value]="dept.departmentId">

              {{ dept.departmentName }}

            </mat-option>

          </mat-select>

        </mat-form-field>

        <!-- DOB -->

        <mat-form-field appearance="outline">

          <mat-label>
            Date of Birth
          </mat-label>

          <input
            matInput
            type="date"
            formControlName="dob">

        </mat-form-field>

        <!-- DOJ -->

        <mat-form-field appearance="outline">

          <mat-label>
            Date of Joining
          </mat-label>

          <input
            matInput
            type="date"
            formControlName="doj">

        </mat-form-field>

        <!-- Role (Read Only) -->

        <mat-form-field appearance="outline">

          <mat-label>
            Role
          </mat-label>

          <input
            matInput
            formControlName="role"
            readonly>

        </mat-form-field>

      </div>

      <div class="button-section">

        <button
          mat-raised-button
          color="primary"
          type="submit">

          Update Employee

        </button>

      </div>

    </form>

  </mat-card>

</div>
