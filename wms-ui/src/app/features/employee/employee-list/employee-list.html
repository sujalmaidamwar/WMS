<div class="employee-container">

  <mat-card>

    <h2>Employees</h2>

    <table mat-table [dataSource]="employees" class="mat-elevation-z8">

      <!-- Employee Id -->
      <ng-container matColumnDef="employeeId">

        <th mat-header-cell *matHeaderCellDef>
          ID
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.employeeId }}

        </td>
      </ng-container>

      <!-- First Name -->
      <ng-container matColumnDef="firstName">

        <th mat-header-cell *matHeaderCellDef>
          First Name
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.firstName }}

        </td>
      </ng-container>

      <!-- Last Name -->
      <ng-container matColumnDef="lastName">

        <th mat-header-cell *matHeaderCellDef>
          Last Name
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.lastName }}

        </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">

        <th mat-header-cell *matHeaderCellDef>
          Email
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.email }}

        </td>
      </ng-container>

      <!-- Phone -->
      <ng-container matColumnDef="phoneNumber">

        <th mat-header-cell *matHeaderCellDef>
          Phone
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.phoneNumber }}

        </td>
      </ng-container>

      <ng-container matColumnDef="departmentName">

        <th mat-header-cell *matHeaderCellDef>

          Department

        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.departmentName }}

        </td>

      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>
          Status
        </th>

        <td mat-cell *matCellDef="let employee">

          {{ employee.status }}

        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">

        <th mat-header-cell *matHeaderCellDef>
          Actions
        </th>

        <td mat-cell *matCellDef="let employee">

          <button mat-raised-button color="accent" [routerLink]="[
        '/edit-employee',
        employee.employeeId
      ]">

            Edit

          </button>

          <button mat-raised-button color="warn" class="delete-btn" (click)="deleteEmployee(
        employee.employeeId
      )">

            Delete

          </button>

        </td>

      </ng-container>


      <tr mat-header-row *matHeaderRowDef="displayedColumns">
      </tr>

      <tr mat-row *matRowDef="
            let row;
            columns: displayedColumns;
          ">
      </tr>

    </table>

    <div class="header-section">

      <button mat-raised-button color="primary" routerLink="/add-employee">

        Add Employee

      </button>

    </div>


  </mat-card>

</div>
