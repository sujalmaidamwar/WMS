<div class="attendance-container">


  <p *ngIf="isManager()"></p>

  <mat-card>
    <div class="button-group">

      <button mat-raised-button color="primary" (click)="checkIn()">

        Check In

      </button>

      <button mat-raised-button color="accent" (click)="checkOut()">

        Check Out

      </button>

    </div>

    <h2>My Attendance</h2>

    <table mat-table [dataSource]="attendanceRecords">

      <!-- Date -->
      <ng-container matColumnDef="attendanceDate">

        <th mat-header-cell *matHeaderCellDef>

          Date

        </th>

        <td mat-cell *matCellDef="let record">

          {{
          record.attendanceDate
          | date
          }}

        </td>

      </ng-container>

      <ng-container matColumnDef="checkInTime">

        <th mat-header-cell *matHeaderCellDef>

          Check In

        </th>

        <td mat-cell *matCellDef="let record">

          {{
          record.checkInTime
          | date:'shortTime'
          }}

        </td>

      </ng-container>

      <ng-container matColumnDef="checkOutTime">

        <th mat-header-cell *matHeaderCellDef>

          Check Out

        </th>

        <td mat-cell *matCellDef="let record">

          {{
          record.checkOutTime
          | date:'shortTime'
          }}

        </td>

      </ng-container>

      <ng-container matColumnDef="totalHours">

        <th mat-header-cell *matHeaderCellDef>

          Total Hours

        </th>

        <td mat-cell *matCellDef="let record">

          {{
          record.totalHours
          | number:'1.1-1'
          }}

        </td>

      </ng-container>

      <ng-container matColumnDef="workMode">

        <th mat-header-cell *matHeaderCellDef>

          Work Mode

        </th>

        <td mat-cell *matCellDef="let record">

          {{
          record.workMode
          }}

        </td>

      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">

        <th mat-header-cell *matHeaderCellDef>

          Status

        </th>



        <td mat-cell *matCellDef="let record">

          {{ record.status }}

        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="
          displayedColumns
        ">
      </tr>

      <tr mat-row *matRowDef="
          let row;
          columns: displayedColumns
        ">
      </tr>

    </table>

  </mat-card>

</div>
