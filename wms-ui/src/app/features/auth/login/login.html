<div class="login-container">

  <div class="overlay"></div>

  <mat-card class="login-card">

    <div class="login-header">

      <div class="logo-container">

        <div class="logo-icon">
          👥
        </div>

      </div>

      <h2>
        Workforce Management System
      </h2>

      

    </div>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onLogin()">

      <mat-form-field
        appearance="outline"
        class="full-width">

        <mat-label>
          Username
        </mat-label>

        <input
          matInput
          formControlName="username">

      </mat-form-field>

      <mat-form-field
        appearance="outline"
        class="full-width">

        <mat-label>
          Password
        </mat-label>

        <input
          matInput
          type="password"
          formControlName="password">

      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        class="full-width login-btn">

        Sign In

      </button>

      <p
        class="error-message"
        *ngIf="errorMessage">

        {{ errorMessage }}

      </p>

    </form>

    <div class="footer-text">

      Workforce Management System © 2026

    </div>

  </mat-card>

</div>
