<div class="announcement-page">

  <mat-card class="announcement-card">

    <div class="header-section">

      <div class="header-icon">
      </div>

      <div class="header-content">

        <h1>
          Create Announcement
        </h1>

        <p>
          Publish important updates and notifications
          for employees and managers across the organization.
        </p>

      </div>

    </div>

    <form
      [formGroup]="announcementForm"
      (ngSubmit)="onSubmit()">

      <div class="form-section">

        <mat-form-field
          appearance="outline"
          class="full-width">

          <mat-label>
            Announcement Title
          </mat-label>

          <input
            matInput
            placeholder="Enter announcement title"
            formControlName="title">

        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="full-width">

          <mat-label>
            Announcement Message
          </mat-label>

          <textarea
            matInput
            rows="6"
            placeholder="Write announcement details here..."
            formControlName="message">
          </textarea>

        </mat-form-field>

        <div class="checkbox-section">

          <mat-checkbox
            formControlName="isActive">

            Publish Immediately

          </mat-checkbox>

        </div>

      </div>

      <div class="button-section">

        <button
          mat-raised-button
          color="primary"
          type="submit">

          Save Announcement

        </button>

        <button
          mat-stroked-button type="button" (click)="onCancel()">

          Cancel

        </button>

      </div>

    </form>

  </mat-card>

</div>
