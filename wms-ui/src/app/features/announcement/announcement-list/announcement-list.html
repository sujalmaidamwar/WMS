<div class="announcement-container">

  <mat-card class="announcement-card">

    <div class="header">

      <div class="title-section">

        <h2>Announcements</h2>

        <p>
          Organization-wide updates and notifications
        </p>

      </div>

      <div *ngIf="isAdmin() || isManager()">

        <button
          mat-raised-button
          color="primary"
          [routerLink]="['/add-announcement']">

          + New Announcement

        </button>

      </div>

    </div>

    <div class="table-container">

      <table
        mat-table
        [dataSource]="announcements">

        <!-- Title -->

        <ng-container matColumnDef="title">

          <th mat-header-cell *matHeaderCellDef>
            Title
          </th>

          <td mat-cell *matCellDef="let announcement">

            <strong>
              {{ announcement.title }}
            </strong>

          </td>

        </ng-container>

        <!-- Message -->

        <ng-container matColumnDef="message">

          <th mat-header-cell *matHeaderCellDef>
            Message
          </th>

          <td mat-cell *matCellDef="let announcement">

            {{ announcement.message }}

          </td>

        </ng-container>

        <!-- Created On -->

        <ng-container matColumnDef="createdOn">

          <th mat-header-cell *matHeaderCellDef>
            Created On
          </th>

          <td mat-cell *matCellDef="let announcement">

            {{ announcement.createdOn | date:'dd MMM yyyy' }}

          </td>

        </ng-container>

        <!-- Status -->

        <ng-container matColumnDef="isActive">

          <th mat-header-cell *matHeaderCellDef>
            Status
          </th>

          <td mat-cell *matCellDef="let announcement">

            <span
              class="status-badge active"
              *ngIf="announcement.isActive">

              Active

            </span>

            <span
              class="status-badge inactive"
              *ngIf="!announcement.isActive">

              Inactive

            </span>

          </td>

        </ng-container>

        <!-- Actions -->

        <ng-container matColumnDef="actions">

          <th mat-header-cell *matHeaderCellDef>
            Actions
          </th>

          <td mat-cell *matCellDef="let announcement">

            <button
              *ngIf="isAdmin() || isManager()"
              mat-stroked-button
              color="warn"
              (click)="
                deleteAnnouncement(
                  announcement.announcementId
                )
              ">

              Delete

            </button>

          </td>

        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns">
        </tr>

        <tr
          mat-row
          *matRowDef="
            let row;
            columns: displayedColumns
          ">
        </tr>

      </table>

    </div>

  </mat-card>

</div>
